<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mi Espacio">
  <title>Mi Espacio</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen">
  <div class="auth-card">
    <div class="auth-logo"><i class="ti ti-layout-dashboard"></i></div>
    <h1>Mi Espacio</h1>
    <p class="auth-sub">Tu workspace personal</p>
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>
    <div id="auth-error" class="auth-error hidden"></div>
    <div id="tab-login">
      <input type="email" id="login-email" placeholder="Email" autocomplete="email">
      <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
      <button class="btn-primary" onclick="login()">Entrar</button>
    </div>
    <div id="tab-register" class="hidden">
      <input type="email" id="reg-email" placeholder="Email" autocomplete="email">
      <input type="password" id="reg-pass" placeholder="Contraseña (mín. 8 caracteres)" autocomplete="new-password">
      <input type="password" id="reg-pass2" placeholder="Confirmar contraseña" autocomplete="new-password">
      <button class="btn-primary" onclick="register()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen hidden">
  <header class="topbar">
    <span class="topbar-title"><i class="ti ti-layout-dashboard"></i> Mi Espacio</span>
    <div class="topbar-right">
      <span id="sync-status" class="sync-badge"></span>
      <span id="user-email-label" class="user-label"></span>
      <button class="icon-btn" onclick="logout()" title="Cerrar sesión"><i class="ti ti-logout"></i></button>
    </div>
  </header>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showSection('tasks')" id="nav-tasks">
      <i class="ti ti-checks"></i><span>Tareas</span>
    </button>
    <button class="nav-btn" onclick="showSection('calendar')" id="nav-calendar">
      <i class="ti ti-calendar"></i><span>Calendario</span>
    </button>
    <button class="nav-btn" onclick="showSection('ideas')" id="nav-ideas">
      <i class="ti ti-bulb"></i><span>Ideas</span>
    </button>
  </nav>

  <main class="content">

    <!-- TASKS -->
    <section id="section-tasks" class="section">
      <div class="section-header">
        <h2>Tareas</h2>
        <span id="task-count" class="count-badge"></span>
      </div>
      <div class="input-row">
        <input type="text" id="task-input" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addTask()">
        <select id="task-priority">
          <option value="high">🔴 Alta</option>
          <option value="med" selected>🟡 Media</option>
          <option value="low">🟢 Baja</option>
        </select>
        <button class="btn-primary" onclick="addTask()">Agregar</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Pendientes</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Completadas</button>
      </div>
      <div id="task-list" class="list"></div>
    </section>

    <!-- CALENDAR -->
    <section id="section-calendar" class="section hidden">
      <div class="cal-header">
        <button class="icon-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <h2 id="cal-month-label"></h2>
        <button class="icon-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="event-add-area">
        <p id="selected-day-label" class="selected-label">Seleccioná un día para agregar un evento</p>
        <div class="input-row" id="event-input-row" style="display:none">
          <input type="text" id="event-label" placeholder="Nombre del evento..." onkeydown="if(event.key==='Enter')addEvent()">
          <button class="btn-primary" onclick="addEvent()">Marcar</button>
        </div>
      </div>
      <div id="events-list" class="list"></div>
    </section>

    <!-- IDEAS -->
    <section id="section-ideas" class="section hidden">
      <div class="section-header">
        <h2>Ideas de proyectos</h2>
        <span id="idea-count" class="count-badge"></span>
      </div>
      <div class="input-row flex-wrap">
        <input type="text" id="idea-name" placeholder="Nombre del proyecto..." style="flex:2;min-width:140px" onkeydown="if(event.key==='Enter')addIdea()">
        <input type="text" id="idea-desc" placeholder="Descripción breve..." style="flex:3;min-width:160px">
        <select id="idea-tag">
          <option value="diseño">Diseño</option>
          <option value="tech">Tech</option>
          <option value="negocio">Negocio</option>
          <option value="personal">Personal</option>
          <option value="otro">Otro</option>
        </select>
        <button class="btn-primary" onclick="addIdea()">+ Idea</button>
      </div>
      <div class="ideas-grid" id="ideas-grid"></div>
      <div class="export-row">
        <button class="btn-secondary" onclick="exportJSON()"><i class="ti ti-download"></i> Exportar JSON</button>
        <label class="btn-secondary"><i class="ti ti-upload"></i> Importar JSON<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
      </div>
    </section>

  </main>
</div>

<script src="js/config.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/db.js?v=3"></script>
<script src="js/tasks.js?v=3"></script>
<script src="js/calendar.js?v=3"></script>
<script src="js/ideas.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
